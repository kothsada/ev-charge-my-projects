apiVersion: v1
kind: Service
metadata:
  name: panda-gateway-api-service
  labels:
    app: panda-gateway-api
  annotations:
    cloud.google.com/backend-config: '{"default": "panda-gateway-api-backendconfig"}'
spec:
  type: NodePort
  selector:
    app: panda-gateway-api
  ports:
    - name: http
      port: 80
      targetPort: 4004
