apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - deployment.yaml
  - service.yaml
  - serviceaccount.yaml
  - backendconfig.yaml
  - hpa.yaml
  - pdb.yaml

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: panda-gateway-api-config
    literals:
      - PORT="4004"
      - RABBITMQ_PAYMENT_EVENTS_QUEUE="PANDA_EV_PAYMENT_EVENTS"
      - SERVICE_NAME="gateway-api"
      - ALLOWED_ORIGINS="*"
