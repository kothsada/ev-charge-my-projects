apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: panda-ev-prod

resources:
  - ../../base

patches:
  - target:
      kind: Deployment
      name: panda-ocpp-api
    patch: |-
      # 1. Update Master Proxy (Port 5432)
      - op: replace
        path: /spec/template/spec/containers/1/name
        value: cloud-sql-proxy-master
      - op: replace
        path: /spec/template/spec/containers/1/args
        value:
          - "--structured-logs"
          - "--port=5432"
          - "--private-ip"
          - "--health-check"
          - "--http-address=0.0.0.0"
          - "pandaev:asia-southeast1:panda-ev-instance-ocpp-db-a2"

      # 2. ADD Slave Proxy (Port 5433)
      - op: add
        path: /spec/template/spec/containers/-
        value:
          name: cloud-sql-proxy-replica
          image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.14.2
          args:
            - "--structured-logs"
            - "--port=5433"
            - "--private-ip"
            - "--health-check"
            - "--http-address=0.0.0.0"
            - "--http-port=9091"
            - "pandaev:asia-southeast1:panda-ev-instance-ocpp-db-a2-replica"
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"

      # 3. Increase Main App Resources
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "500m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "2000m"

configMapGenerator:
  - name: panda-ocpp-api-config
    behavior: merge
    literals:
      - NODE_ENV="production"
      - REDIS_URL="redis://10.231.221.4:6379"
      - DATABASE_URL="postgresql://panda_ocpp_user:PASSWORD@127.0.0.1:5432/panda_ev_ocpp?schema=panda_ev_ocpp"
      - DATABASE_REPLICA_URL="postgresql://panda_ocpp_reader:PASSWORD@127.0.0.1:5433/panda_ev_ocpp?schema=panda_ev_ocpp"
