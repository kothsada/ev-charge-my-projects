name: Build and Deploy — panda-notification-api

on:
  push:
    branches:
      - main
      - develop
    paths:
      - "**"
      - "!**.md"
  workflow_dispatch:

env:
  PROJECT_ID: pandaev
  GAR_LOCATION: asia-southeast1
  REPOSITORY: panda-ev-repo
  IMAGE: panda-notification-api
  CLUSTER_NAME: panda-ev-cluster
  CLUSTER_REGION: asia-southeast1
  DEPLOYMENT_NAME: panda-notification-api
  CONTAINER_NAME: panda-notification-api  # must match containers[].name in deployment.yaml
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    name: Build → Push → Deploy
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      id-token: write

    steps:
      # ────────────────────────────────────────────────────────────────────────
      # 1. Checkout source code
      # ────────────────────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ────────────────────────────────────────────────────────────────────────
      # 2. Set environment variables based on branch
      # ────────────────────────────────────────────────────────────────────────
      - name: Set environment variables
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "ENV_NAME=prod" >> $GITHUB_ENV
            echo "K8S_NAMESPACE=panda-ev-prod" >> $GITHUB_ENV
          else
            echo "ENV_NAME=dev" >> $GITHUB_ENV
            echo "K8S_NAMESPACE=panda-ev-dev" >> $GITHUB_ENV
          fi

      # ────────────────────────────────────────────────────────────────────────
      # 3. Authenticate to GCP via Workload Identity Federation
      # ────────────────────────────────────────────────────────────────────────
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          token_format: access_token
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      # ────────────────────────────────────────────────────────────────────────
      # 4. Configure Docker to authenticate with Artifact Registry
      # ────────────────────────────────────────────────────────────────────────
      - name: Login to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GAR_LOCATION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      # ────────────────────────────────────────────────────────────────────────
      # 5. Set up Docker Buildx (enables layer caching)
      # ────────────────────────────────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ────────────────────────────────────────────────────────────────────────
      # 6. Build and push Docker image
      # ────────────────────────────────────────────────────────────────────────
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:latest
          cache-from: type=registry,ref=${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:buildcache,mode=max

      # ────────────────────────────────────────────────────────────────────────
      # 7. Get GKE cluster credentials
      # ────────────────────────────────────────────────────────────────────────
      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.CLUSTER_NAME }}
          location: ${{ env.CLUSTER_REGION }}

      # ────────────────────────────────────────────────────────────────────────
      - name: Set up Kustomize
        run: |-
          curl -sfL https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.4.1/kustomize_v5.4.1_linux_amd64.tar.gz | tar xz
          chmod u+x kustomize

      - name: Deploy via Kustomize
        run: |
          KUSTOMIZE_BIN=$(pwd)/kustomize
          cd k8s/overlays/${{ env.ENV_NAME }}
          $KUSTOMIZE_BIN edit set image ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:${{ github.sha }}
          $KUSTOMIZE_BIN build . | kubectl apply -f -


      # ────────────────────────────────────────────────────────────────────────
      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/${{ env.DEPLOYMENT_NAME }} \
            --namespace=${{ env.K8S_NAMESPACE }} \
            --timeout=5m

      # ────────────────────────────────────────────────────────────────────────
      # 11. Debug on failure
      # ────────────────────────────────────────────────────────────────────────
      - name: Debug on failure
        if: failure()
        run: |
          echo "── Deployment Status ─────────────────────────────────────────"
          kubectl describe deployment/${{ env.DEPLOYMENT_NAME }} --namespace=${{ env.K8S_NAMESPACE }}
          echo "── Pod Status ────────────────────────────────────────────────"
          kubectl get pods --namespace=${{ env.K8S_NAMESPACE }} -l app=${{ env.DEPLOYMENT_NAME }}
          echo "── Pod Details (Events) ──────────────────────────────────────"
          kubectl describe pods --namespace=${{ env.K8S_NAMESPACE }} -l app=${{ env.DEPLOYMENT_NAME }}
          echo "── Container Logs (last 50 lines) ────────────────────────────"
          kubectl logs deployment/${{ env.DEPLOYMENT_NAME }} --namespace=${{ env.K8S_NAMESPACE }} --all-containers=true --tail=50

      # ────────────────────────────────────────────────────────────────────────
      # 12. Post-deploy verification
      # ────────────────────────────────────────────────────────────────────────
      - name: Verify deployment
        if: success()
        run: |
          echo "── Pods ──────────────────────────────────────────────────────"
          kubectl get pods \
            --namespace=${{ env.K8S_NAMESPACE }} \
            --selector=app=${{ env.DEPLOYMENT_NAME }} \
            --output=wide
          echo "── Deployment ────────────────────────────────────────────────"
          kubectl get deployment ${{ env.DEPLOYMENT_NAME }} \
            --namespace=${{ env.K8S_NAMESPACE }}
